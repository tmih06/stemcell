# build_toggles.toml — what to include in the default `make build` /
# `make build-release`.
#
# Each key maps 1:1 to a Cargo feature. The resolved set is passed to
# `cargo build --no-default-features --features <set>`. To disable
# something, flip its value to `false`. To add a new toggle, append
# it under the appropriate section AND register it in the matching
# list in:
#   - src/scripts/tool_features.py  (TOGGLE_TO_FEATURE)
#   - build.rs                       (TOGGLE_TO_FEATURE)

## == Tools ==
