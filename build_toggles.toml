## == Channels ==
## Messaging platforms. Enabling these pulls in heavyweight client
## dependencies (teloxide, serenity, slack-morphism, whatsapp-rust, …).
[channels]
telegram = true
whatsapp = true
discord = true
slack = true
trello = true

