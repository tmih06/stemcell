name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly scan (Mondays 07:17 UTC) to catch advisories in code that
    # hasn't changed since the last push.
    - cron: '17 7 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      # Required for CodeQL to upload results to the Security tab.
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: manual
          - language: actions
            build-mode: none

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Rust requires a real build so CodeQL can extract the analysis
      # database. Mirror the CI toolchain + system deps (ALSA for the
      # local-stt feature) so --all-features compiles.
      - name: Install Rust (from rust-toolchain.toml)
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@v2
        if: matrix.language == 'rust'
        with:
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install mold + ALSA dev (Linux)
        if: matrix.language == 'rust'
        run: sudo apt-get update -qq && sudo apt-get install -y mold clang libasound2-dev

      - name: Build (Rust)
        if: matrix.language == 'rust'
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
        run: cargo build --locked --profile ci --all-features

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
